<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Expired — Secure File Drop</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="logo-text">Secure <span>File Drop</span></span>
    </div>

    <div class="status-icon">&#9203;</div>
    <h1 class="status-title">This link has expired</h1>
    <p class="status-body">
      The file is no longer available. Links expire after the time set by the sender,
      or immediately after a one-time download is used.
    </p>

    <hr class="divider" />

    <a href="/" class="btn btn-ghost">Share your own file</a>

  </div>
</body>
</html>
