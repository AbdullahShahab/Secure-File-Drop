<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Passcode — Secure File Drop</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="logo-text">Secure <span>File Drop</span></span>
    </div>

    <div class="status-icon">&#128274;</div>
    <h1 class="status-title">Passcode required</h1>
    <p class="status-body">This file is protected. Enter the passcode to download it.</p>

    <form method="post" id="passcode-form">
      <div class="form-group">
        <label for="passcode">Passcode</label>
        <input type="password" name="passcode" id="passcode"
               placeholder="Enter passcode" autocomplete="current-password" autofocus required />
      </div>

      {% if error %}
        <p style="color: var(--danger); font-size: .875rem; margin-bottom: .75rem; text-align: center;">
          Incorrect passcode. Please try again.
        </p>
      {% endif %}

      <button type="submit" class="btn btn-primary" id="submit-btn">
        <span class="btn-text">Download file</span>
        <span class="spinner"></span>
      </button>
    </form>

  </div>

  <script>
    document.getElementById('passcode-form').addEventListener('submit', function () {
      const btn = document.getElementById('submit-btn');
      btn.classList.add('loading');
      btn.disabled = true;
    });
  </script>
</body>
</html>
